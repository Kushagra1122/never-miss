services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nevermiss
      POSTGRES_PASSWORD: nevermiss
      POSTGRES_DB: nevermiss
    # Host 5433 avoids clashing with a local Postgres on 5432 (wrong server = "role nevermiss does not exist")
    ports:
      - "5433:5432"
    volumes:
      - nevermiss_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nevermiss -d nevermiss"]
      interval: 2s
      timeout: 5s
      retries: 15

volumes:
  nevermiss_pg:
